name: indexnow-ping

on:
  push:
    branches: [main]
    paths:
      - "src/app/**"
      - "src/components/**"
      - "public/**"
      - "src/app/sitemap.ts"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: indexnow-ping
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for Vercel deploy to settle
        run: sleep 90

      - name: Ping IndexNow
        run: python3 scripts/ping-indexnow.py
